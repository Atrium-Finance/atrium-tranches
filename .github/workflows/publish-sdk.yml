name: Publish SDK to npm

# Publishes the `atrium-sdk` package (in ./sdk) to npm.
#
# Trigger by pushing a tag `sdk-v<version>` that matches the version in
# sdk/package.json, e.g.:
#   git tag sdk-v0.1.0 && git push origin sdk-v0.1.0
# or run manually from the Actions tab (supports a dry-run).
#
# Requires repository secret NPM_TOKEN (an npm automation token with
# publish rights to the `atrium-sdk` package / its scope).

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish in --dry-run mode (no upload)"
        type: boolean
        default: true

concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance attestation
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: sdk/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#sdk-v}"
          echo "package.json: $PKG_VERSION | tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match sdk/package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: pnpm publish --no-git-checks --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: "!(github.event_name == 'workflow_dispatch' && inputs.dry_run)"
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
